services:
  - type: web
    name: weekly-planner-frontend
    runtime: static
    plan: free
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_INSFORGE_BASE_URL
        value: https://kqvj3q5t.eu-central.insforge.app
      - key: VITE_INSFORGE_ANON_KEY
        sync: false
    buildFilter:
      paths:
        - src/**
        - package.json
        - vite.config.ts
        - index.html
